<svg width="680" height="720" viewBox="0 0 680 720" role="img" xmlns="http://www.w3.org/2000/svg">
  <title>eTOL SmartPay logo</title>
  <desc>App logo met slagboom, detectiegolven en A24 badge</desc>

  <defs>
    <radialGradient id="bgGrad" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#1565C0"/>
      <stop offset="100%" stop-color="#0D3F7A"/>
    </radialGradient>
    <clipPath id="roundClip">
      <rect x="40" y="40" width="600" height="600" rx="120"/>
    </clipPath>
  </defs>

  <!-- Achtergrond -->
  <rect x="40" y="40" width="600" height="600" rx="120" fill="#1255A8"/>
  <rect x="40" y="40" width="600" height="600" rx="120" fill="url(#bgGrad)" opacity="0.85"/>

  <g clip-path="url(#roundClip)">
    <rect x="40" y="480" width="600" height="160" fill="#0A3568" opacity="0.7"/>
    <rect x="40" y="500" width="600" height="6" fill="#1E88E5" opacity="0.5"/>
  </g>

  <!-- Detectiegolven van boven -->
  <g fill="none" stroke-linecap="round">
    <path d="M255 135 Q340 60 425 135" stroke="#5BB8FF" stroke-width="6" opacity="0.5"/>
    <path d="M275 163 Q340 103 405 163" stroke="#7ECFFF" stroke-width="6" opacity="0.65"/>
    <path d="M298 190 Q340 152 382 190" stroke="#A8E0FF" stroke-width="6" opacity="0.9"/>
  </g>

  <!-- Antenne punt -->
  <circle cx="340" cy="210" r="11" fill="#FFFFFF" opacity="0.95"/>
  <circle cx="340" cy="210" r="5" fill="#5BB8FF"/>

  <!-- Slagboom paal -->
  <rect x="155" y="268" width="26" height="230" rx="7" fill="#FFFFFF"/>
  <!-- Paal voet -->
  <rect x="140" y="490" width="56" height="16" rx="5" fill="#CCDDFF" opacity="0.8"/>

  <!-- Slagboom arm -->
  <g transform="rotate(-18, 168, 278)">
    <rect x="168" y="264" width="300" height="28" rx="7" fill="#E53935"/>
    <rect x="168" y="264" width="50" height="28" rx="0" fill="#FFFFFF"/>
    <rect x="168" y="264" width="7"  height="28" rx="4" fill="#E53935"/>
    <rect x="268" y="264" width="50" height="28" fill="#FFFFFF"/>
    <rect x="368" y="264" width="50" height="28" fill="#FFFFFF"/>
    <circle cx="468" cy="278" r="14" fill="#E53935" stroke="#FFFFFF" stroke-width="3"/>
  </g>

  <!-- Contragewicht -->
  <rect x="125" y="270" width="30" height="40" rx="5" fill="#CFD8DC"/>

  <!-- A24 Badge -->
  <rect x="385" y="345" width="160" height="78" rx="12" fill="#C62828"/>
  <rect x="388" y="348" width="154" height="72" rx="10" fill="none" stroke="#FFFFFF" stroke-width="3"/>
  <text x="465" y="403" font-family="Arial Black, sans-serif" font-size="40" font-weight="900" fill="#FFFFFF" text-anchor="middle" letter-spacing="2">A24</text>

  <!-- Auto silhouet -->
  <g opacity="0.18">
    <rect x="220" y="488" width="240" height="55" rx="10" fill="#FFFFFF"/>
    <rect x="245" y="452" width="190" height="50" rx="14" fill="#FFFFFF"/>
    <circle cx="265" cy="543" r="22" fill="#0A3568"/>
    <circle cx="265" cy="543" r="12" fill="#1E88E5"/>
    <circle cx="415" cy="543" r="22" fill="#0A3568"/>
    <circle cx="415" cy="543" r="12" fill="#1E88E5"/>
  </g>

  <!-- App naam -->
  <text x="340" y="628" font-family="Arial Black, Helvetica, sans-serif" font-size="40" font-weight="900" fill="#FFFFFF" text-anchor="middle" letter-spacing="1">eTOL SmartPay</text>

  <!-- Subtitle -->
  <text x="340" y="668" font-family="Arial, Helvetica, sans-serif" font-size="18" font-weight="400" fill="#90CAF9" text-anchor="middle" letter-spacing="1.2">smart tolbetalen</text>

</svg>
